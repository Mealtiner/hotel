<section class="booking" id="booking" aria-label="Book your stay">
	  <form class="wrap" onsubmit="return false">
	    <div class="bk-field"><label for="bk-in">Arrival</label><input type="date" id="bk-in" value="2026-08-07"></div>
	    <div class="bk-field"><label for="bk-out">Departure</label><input type="date" id="bk-out" value="2026-08-09"></div>
	    <div class="bk-field"><label for="bk-guests">Guests</label><select id="bk-guests"><option>1 guest</option><option selected>2 guests</option><option>3 guests</option><option>4 guests</option><option>5+ guests</option></select></div>
	    <div class="bk-field"><label for="bk-pokoj">Room type</label><select id="bk-pokoj"><option>Standard</option><option selected>Superior</option><option>Superior Plus</option><option>Apartment</option></select></div>
	    <div class="bk-note">Best rate<br>direct from the hotel</div>
	    <div class="bk-submit"><a class="btn" href="/rezervace/">Check availability</a></div>
	  </form>
	</section>
