# GRID Hotel — chybové stránky (nginx ekvivalent htaccess-snippet.txt)
# Vlož do server{} bloku produkčního vhostu. Cesty jsou relativní k webrootu.
# 404 řeší WordPress (šablona 404.php) — sem se nedává, jinak by se error_page
# aplikovala i na stránky, které WP samo správně vrací jako 404 s vlastním obsahem.

error_page 400 /wp-content/themes/grid-divi5-child/errors/400.html;
error_page 403 /wp-content/themes/grid-divi5-child/errors/403.html;
error_page 500 502 /wp-content/themes/grid-divi5-child/errors/500.html;
error_page 503 /wp-content/themes/grid-divi5-child/errors/503.html;

location ~ ^/wp-content/themes/grid-divi5-child/errors/.*\.html$ {
    internal;
}
