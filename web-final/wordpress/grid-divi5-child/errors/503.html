<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chyba 503 — Zastávka v boxech. | GRID HOTEL</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#C20E1A;--red-hi:#FF5A50;--gold:#CAA75F;--offwhite:#F4F2F0;--grey:#B9B7B9}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#0d0f12;color:var(--offwhite);-webkit-font-smoothing:antialiased;
 background-image:
  linear-gradient(27deg,#16181c 5px,transparent 5px) 0 5px,
  linear-gradient(207deg,#16181c 5px,transparent 5px) 10px 0,
  linear-gradient(27deg,#1b1e22 5px,transparent 5px) 0 10px,
  linear-gradient(207deg,#1b1e22 5px,transparent 5px) 10px 5px,
  linear-gradient(90deg,#14161a 10px,transparent 10px),
  linear-gradient(#191c20 25%,#141619 25%,#141619 50%,transparent 50%,transparent 75%,#1d2024 75%,#1d2024);
 background-size:20px 20px;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:clamp(30px,6vw,80px);position:relative}
.logo{position:absolute;top:clamp(20px,4vw,40px);left:50%;transform:translateX(-50%)}
.logo img{height:40px;width:auto}
.inner{max-width:44ch}
.num{font-family:'Saira Condensed',sans-serif;font-weight:800;line-height:.78;font-size:clamp(7rem,26vw,19rem);color:transparent;-webkit-text-stroke:2px rgba(255,90,80,.55);letter-spacing:.02em;margin-bottom:6px}
.kicker{font-family:'Space Mono','JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--red-hi)}
h1{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;font-size:clamp(2rem,5vw,3.6rem);margin:14px 0 12px;color:#fff;line-height:.95}
p{color:var(--grey);font-size:1.05rem;margin-bottom:30px}
.btn{font-family:'JetBrains Mono',monospace;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;background:var(--red);color:#fff;padding:13px 26px;border:1px solid var(--red);display:inline-block;text-decoration:none;transition:.25s}
.btn:hover{background:var(--red-hi);box-shadow:0 0 22px rgba(194,14,26,.5);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="/"><img src="../assets/logo/grid-hotel-negativ.png" alt="GRID HOTEL"></a>
  <div class="inner">
    <div class="num">503</div>
    <span class="kicker" id="ge-k">Chyba 503</span>
    <h1 id="ge-h">Zastávka v boxech.</h1>
    <p id="ge-s">Web je na chvíli v servisu. Za okamžik jsme zpátky na trati.</p>
    <a class="btn" id="ge-b" href="/">Zpět na start</a>
  </div>
</div>
<script>
(function(){
  var T={"cs": {"k": "Chyba 503", "h": "Zastávka v boxech.", "s": "Web je na chvíli v servisu. Za okamžik jsme zpátky na trati.", "b": "Zpět na start"}, "en": {"k": "Error 503", "h": "Pit stop.", "s": "The site is briefly under maintenance. We’ll be back on track shortly.", "b": "Back to start"}, "de": {"k": "Boxenstopp", "h": "Boxenstopp.", "s": "Die Seite ist kurz in Wartung. Wir sind gleich zurück auf der Strecke.", "b": "Zurück zum Start"}};
  var l=(navigator.language||'cs').slice(0,2).toLowerCase();
  if(!T[l]) l='cs';
  document.documentElement.lang=l;
  document.getElementById('ge-k').textContent=T[l].k;
  document.getElementById('ge-h').textContent=T[l].h;
  document.getElementById('ge-s').textContent=T[l].s;
  document.getElementById('ge-b').textContent=T[l].b;
})();
</script>
</body>
</html>
