# GRID Hotel — nginx hardening pro PRODUKCI (nasadit spolu s migrací UpdraftPlus)
# Vlož do server{} bloku produkčního vhostu, PŘED běžný `location /` blok s try_files.
#
# DŮVOD: statické soubory na disku (zálohy, readme, staré .bak apod.) obsluhuje nginx
# přímo, PHP/WordPress se vůbec nespustí — blokace na úrovni WordPressu (functions.php)
# proto NENÍ spolehlivá a musí se řešit tady, na webserveru.

# --- P0: UpdraftPlus zálohy nikdy nesmí být veřejně dostupné ---
# (audit: .htaccess "deny from all" v /wp-content/updraft/ nginx ignoruje)
location ^~ /wp-content/updraft/ {
    deny all;
    return 404;
}

# --- Ostatní typicky citlivé WP adresáře, které nemají důvod být veřejné ---
location ^~ /wp-content/uploads/backup { deny all; return 404; }
location ~ /wp-content/(uploads|cache)/.*\.php$ { deny all; return 404; } # žádné PHP v uploads/cache

# --- Zálohové/pracovní přípony souborů — kdyby se kdykoliv objevily na disku ---
location ~* \.(bak|old|orig|save|swp|dist|log|sql|zip|tar|gz)$ {
    deny all;
    return 404;
}

# --- WordPress core fingerprinting soubory ---
location ~* ^/(readme\.html|readme\.txt|license\.txt|wp-config-sample\.php)$ {
    deny all;
    return 404;
}

# --- XML-RPC (vypnuto i na úrovni WP filtru xmlrpc_enabled, zde navíc na webserveru) ---
location = /xmlrpc.php {
    deny all;
    return 404;
}
